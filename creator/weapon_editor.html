<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge d'Armes | Creator Engine</title>
    <link rel="stylesheet" href="css/creator.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="secondary" onclick="location.href='index.html'"><span>⬅️</span> Retour</button>
            <h1>FORGE D'ARMES</h1>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button id="btn-save" style="background: var(--success);"><span>💾</span> Sauvegarder l'Arsenal</button>
        </div>
    </header>

    <div class="container">
        <div class="editor-layout" style="grid-template-columns: 350px 1fr;">
            <!-- Sidebar -->
            <div class="panel">
                <div class="panel-header">
                    <span>ARMES DISPONIBLES</span>
                    <button class="secondary" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" id="btn-add">Nouvelle Arme</button>
                </div>
                <div class="panel-content" id="weapon-list"></div>
            </div>

            <!-- Form -->
            <div class="panel">
                <div class="panel-header" id="weapon-title">SÉLECTIONNEZ UNE ARME</div>
                <div class="panel-content">
                    <div id="editor-form" style="max-width: 800px; margin: 0 auto; display: none;">
                        <div class="grid-2">
                            <div class="form-group"><label>ID Technique</label><input type="text" id="field-id" disabled></div>
                            <div class="form-group"><label>Nom de l'Arme</label><input type="text" id="field-name"></div>
                        </div>

                        <div class="grid-3">
                            <div class="form-group">
                                <label>Type</label>
                                <select id="field-type">
                                    <option value="attack">Projectile (Attaque)</option>
                                    <option value="defense">Orbital (Défense)</option>
                                    <option value="aoe">Aura (Zone)</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Dégâts</label><input type="number" id="field-damage"></div>
                            <div class="form-group"><label>Vitesse Fire (ms)</label><input type="number" id="field-fire-rate"></div>
                        </div>

                        <div class="grid-3">
                            <div class="form-group"><label>Vitesse Proj.</label><input type="number" id="field-proj-speed"></div>
                            <div class="form-group"><label>Durée de vie (ms)</label><input type="number" id="field-lifetime"></div>
                            <div class="form-group"><label>Portée (px)</label><input type="number" id="field-range"></div>
                        </div>

                        <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                            <h3 style="margin-bottom: 1rem; font-size: 1rem; color: var(--accent);">VISUELS & EFFETS</h3>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea id="field-desc" rows="2"></textarea>
                            </div>
                            <div class="grid-2">
                                <div class="form-group">
                                    <label>Sprite Projectile</label>
                                    <select id="field-sprite"></select>
                                </div>
                                <div class="form-group">
                                    <label>Couleur (si pas de sprite)</label>
                                    <input type="color" id="field-color">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="empty-state" style="text-align: center; color: var(--text-dim); margin-top: 4rem;">
                        <div style="font-size: 4rem; opacity: 0.2;">🛡️</div>
                        <p>Sélectionnez une arme pour modifier ses propriétés balistiques.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/editor_utils.js"></script>
    <script>
        let weapons = [];
        let currentIndex = null;
        let assets = [];

        async function init() {
            const data = await API.loadJSON('data/weapons.json');
            weapons = data.weapons || [];
            assets = await API.listAssets();
            
            const spriteSel = document.getElementById('field-sprite');
            spriteSel.innerHTML = '<option value="">Aucun (Utiliser couleur)</option>';
            assets.forEach(a => spriteSel.innerHTML += `<option value="${a}">${a.split('/').pop()}</option>`);

            renderList();
        }

        function renderList() {
            const list = document.getElementById('weapon-list');
            list.innerHTML = '';
            weapons.forEach((w, i) => {
                const item = document.createElement('div');
                item.className = 'entity-list-item' + (i === currentIndex ? ' active' : '');
                item.innerHTML = `<span><strong>${w.name}</strong> <small>(${w.type})</small></span>`;
                item.onclick = () => selectWeapon(i);
                list.appendChild(item);
            });
        }

        function selectWeapon(index) {
            currentIndex = index;
            const w = weapons[index];
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('editor-form').style.display = 'block';
            document.getElementById('weapon-title').innerText = `FORGE : ${w.name.toUpperCase()}`;

            document.getElementById('field-id').value = w.id;
            document.getElementById('field-name').value = w.name;
            document.getElementById('field-type').value = w.type;
            document.getElementById('field-damage').value = w.damage;
            document.getElementById('field-fire-rate').value = w.fireRate;
            document.getElementById('field-proj-speed').value = w.projectileSpeed || 0;
            document.getElementById('field-lifetime').value = w.lifetime || 0;
            document.getElementById('field-range').value = w.range || 0;
            document.getElementById('field-desc').value = w.description || "";
            document.getElementById('field-sprite').value = w.visuals?.projectile?.path || "";
            document.getElementById('field-color').value = w.visuals?.projectile?.color || "#ffffff";

            renderList();
        }

        document.querySelectorAll('input, select, textarea').forEach(inp => {
            inp.onchange = () => {
                if (currentIndex === null) return;
                const w = weapons[currentIndex];
                w.name = document.getElementById('field-name').value;
                w.type = document.getElementById('field-type').value;
                w.damage = parseInt(document.getElementById('field-damage').value);
                w.fireRate = parseInt(document.getElementById('field-fire-rate').value);
                w.projectileSpeed = parseInt(document.getElementById('field-proj-speed').value);
                w.lifetime = parseInt(document.getElementById('field-lifetime').value);
                w.range = parseInt(document.getElementById('field-range').value);
                w.description = document.getElementById('field-desc').value;
                
                if (!w.visuals) w.visuals = { projectile: {} };
                w.visuals.projectile.path = document.getElementById('field-sprite').value;
                w.visuals.projectile.color = document.getElementById('field-color').value;
                
                renderList();
            };
        });

        document.getElementById('btn-save').onclick = () => API.saveJSON('data/weapons.json', { weapons });
        
        document.getElementById('btn-add').onclick = () => {
            const id = "weapon_" + Date.now();
            weapons.push({
                id, name: "Nouvelle Arme", type: "attack", damage: 10, fireRate: 500,
                visuals: { projectile: { color: "#ffffff" } }
            });
            renderList();
            selectWeapon(weapons.length - 1);
        };

        init();
    </script>
</body>
</html>
