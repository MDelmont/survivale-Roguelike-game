<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Showcase - Spermateozoide Anthony</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: radial-gradient(circle at 30% 30%, #14202b 0%, #0b1117 45%, #05070a 100%);
      color: #e6f1ff;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      z-index: 10;
    }
    #character-container {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .character-frame {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }
    .hidden {
      opacity: 0;
    }
    .visible {
      opacity: 1;
    }
    .controls {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    input[type="range"] {
      width: 200px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>Animation Anthony</strong></div>
    <div style="margin-top:6px;">Alternance entre deux images</div>
  </div>

  <div id="character-container">
    <img id="frame1" src="../assets/monster/sperm_monster_4_v1.png" class="character-frame visible" alt="Anthony Frame 1">
    <img id="frame2" src="../assets/monster/sperm_monster_4_v2.png" class="character-frame hidden" alt="Anthony Frame 2">
  </div>

  <div class="controls">
    <label for="speed">Vitesse d'animation (ms): </label>
    <input type="range" id="speed" min="50" max="500" value="200">
    <span id="speed-value">200ms</span>
  </div>

  <script>
    const frame1 = document.getElementById('frame1');
    const frame2 = document.getElementById('frame2');
    const speedInput = document.getElementById('speed');
    const speedValue = document.getElementById('speed-value');
    const container = document.getElementById('character-container');

    let currentFrame = 1;
    let intervalId;

    function startAnimation() {
      if (intervalId) clearInterval(intervalId);
      const speed = parseInt(speedInput.value);
      speedValue.textContent = speed + 'ms';
      
      intervalId = setInterval(() => {
        if (currentFrame === 1) {
          frame1.classList.remove('visible');
          frame1.classList.add('hidden');
          frame2.classList.remove('hidden');
          frame2.classList.add('visible');
          currentFrame = 2;
        } else {
          frame2.classList.remove('visible');
          frame2.classList.add('hidden');
          frame1.classList.remove('hidden');
          frame1.classList.add('visible');
          currentFrame = 1;
        }
      }, speed);
    }

    speedInput.addEventListener('input', startAnimation);

    // Effet de flottement
    let angle = 0;
    function animate() {
      angle += 0.05;
      const yOffset = Math.sin(angle) * 10;
      container.style.transform = `translateY(${yOffset}px)`;
      requestAnimationFrame(animate);
    }

    startAnimation();
    animate();
  </script>
</body>
</html>
