<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire d'Armements - EVG Anthony</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0af;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .test-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .test-card:hover {
            transform: translateY(-5px);
            border-color: #0af;
        }

        .test-card h2 {
            margin-top: 0;
            color: #ffd700;
            font-size: 1.2rem;
        }

        .canvas-container {
            position: relative;
            width: 360px;
            height: 240px;
            background: #111;
            border: 2px solid #000;
        }

        .controls {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            min-height: 40px;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 5px 15px;
            background: #444;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-reset:hover {
            background: #666;
        }
    </style>
</head>

<body>
    <h1>🔬 Laboratoire Scalable - EVG Anthony</h1>
    <div class="grid" id="test-grid"></div>

    <script type="module">
        import { Player } from '../js/entities/Player.js';
        import { Projectile } from '../js/entities/Projectile.js';
        import { Enemy } from '../js/entities/Enemy.js';
        import { WeaponFactory } from '../js/systems/WeaponFactory.js';
        import { CombatSystem } from '../js/systems/CombatSystem.js';

        // Chargement dynamique des armes depuis weapons.json
        const response = await fetch('../data/weapons.json');
        const data = await response.json();

        const scenarios = data.weapons.map(weapon => {
            // Configuration par défaut de l'ennemi selon le type
            let enemies = [{ x: 280, y: 120, hp: 1000 }];
            let desc = `Logic class: ${weapon.type}. `;

            if (weapon.type === 'defense') {
                enemies = [{ x: 130, y: 120, hp: 1000 }];
                desc += "Protège Anthony en tournant.";
            } else if (weapon.type === 'aoe') {
                enemies = [{ x: 120, y: 80, hp: 1000 }, { x: 160, y: 160, hp: 1000 }];
                desc += "Affecte toute la zone autour.";
            } else {
                desc += "Tire des projectiles.";
            }

            return {
                id: weapon.id,
                name: weapon.name,
                desc: desc,
                weapon: weapon, // On passe l'objet complet
                enemies: enemies
            };
        });

        class Showcase {
            constructor(config, container) {
                this.config = config;
                this.canvas = document.createElement('canvas');
                this.canvas.width = 360;
                this.canvas.height = 240;
                container.appendChild(this.canvas);
                this.ctx = this.canvas.getContext('2d');

                this.reset();
                this.animate();
            }

            reset() {
                this.player = new Player(60, 120, { hp: 100, speed: 0 });
                this.player.setWeapon(WeaponFactory.create({ ...this.config.weapon, name: this.config.name }));
                this.enemies = this.config.enemies.map(e => new Enemy(e.x, e.y, { hp: e.hp, speed: 0, radius: 15 }));
                this.projectiles = [];
                this.explosions = [];
                this.lastTime = performance.now();
            }

            animate(time) {
                const dt = time - this.lastTime || 0;
                this.lastTime = time;
                this.update(dt);
                this.draw();
                requestAnimationFrame((t) => this.animate(t));
            }

            update(dt) {
                // Le joueur délègue tout à son arme via un contexte unifié
                this.player.update(dt, { dx: 0, dy: 0 }, {
                    targetDir: { dx: 1, dy: 0 },
                    onShoot: (x, y, dx, dy, stats) => this.projectiles.push(new Projectile(x, y, dx, dy, stats)),
                    enemies: this.enemies,
                    boss: null,
                    explosions: this.explosions,
                    handleAOE: (x, y, r, d) => CombatSystem.handleAOE({ x, y, radius: r, damage: d, enemies: this.enemies, explosions: this.explosions })
                });

                // Projectiles gèrent leurs propres impacts
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    p.update(dt);

                    for (const e of this.enemies) {
                        if (CombatSystem.checkCollision(p, e)) {
                            p.hit(e, { enemies: this.enemies, explosions: this.explosions });
                            break;
                        }
                    }

                    if (p.x > 360 || p.toRemove) this.projectiles.splice(i, 1);
                }

                // Explosions éphémères
                for (let i = this.explosions.length - 1; i >= 0; i--) {
                    this.explosions[i].timer -= dt;
                    if (this.explosions[i].timer <= 0) this.explosions.splice(i, 1);
                }

                this.enemies.forEach(e => e.update(dt, this.player));
            }

            draw() {
                this.ctx.fillStyle = '#111';
                this.ctx.fillRect(0, 0, 360, 240);

                this.player.draw(this.ctx);

                this.enemies.forEach(e => {
                    e.draw(this.ctx);
                    this.ctx.fillStyle = '#f00';
                    this.ctx.fillRect(e.x - 15, e.y - 25, 30 * (Math.max(0, e.hp) / 1000), 4);
                });

                this.projectiles.forEach(p => p.draw(this.ctx));

                this.explosions.forEach(exp => {
                    const a = exp.timer / exp.maxTimer;
                    this.ctx.beginPath();
                    this.ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255, 100, 0, ${a * 0.4})`;
                    this.ctx.fill();
                    this.ctx.strokeStyle = `rgba(255, 200, 0, ${a})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                });
            }
        }

        const grid = document.getElementById('test-grid');
        scenarios.forEach(sc => {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.innerHTML = `
                <h2>${sc.name}</h2>
                <div class="canvas-container" id="c-${sc.id}"></div>
                <div class="controls">${sc.desc}</div>
                <button class="btn-reset" id="r-${sc.id}">Réinitialiser</button>
            `;
            grid.appendChild(card);
            const inst = new Showcase(sc, document.getElementById(`c-${sc.id}`));
            document.getElementById(`r-${sc.id}`).onclick = () => inst.reset();
        });
    </script>
</body>

</html>
