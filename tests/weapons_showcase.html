<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire d'Armements - EVG Anthony</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0af;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        .test-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .test-card:hover {
            transform: translateY(-5px);
            border-color: #0af;
        }

        .test-card h2 {
            margin-top: 0;
            color: #ffd700;
            font-size: 1.2rem;
        }

        .canvas-container {
            position: relative;
            width: 400px;
            height: 300px;
            background: #0a0a1a;
            border: 2px solid #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .controls {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            min-height: 40px;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 8px 20px;
            background: #0af;
            border: none;
            color: #fff;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #0088cc;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #0af;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="loader" class="loading-overlay">
        <div class="loader"></div>
        <p>Chargement des armements...</p>
    </div>

    <h1>🔬 Laboratoire d'Armements de Combat</h1>
    <div class="grid" id="test-grid"></div>

    <script type="module">
        import { Player } from '../js/entities/Player.js';
        import { Projectile } from '../js/entities/Projectile.js';
        import { Enemy } from '../js/entities/Enemy.js';
        import { WeaponFactory } from '../js/systems/WeaponFactory.js';
        import { CombatSystem } from '../js/systems/CombatSystem.js';
        import { AssetManager } from '../js/core/AssetManager.js';

        // Initialisation du gestionnaire d'assets
        const assetManager = new AssetManager();

        async function init() {
            try {
                // Chargement des données
                const [weaponsRes, playerRes, enemiesRes] = await Promise.all([
                    fetch('../data/weapons.json'),
                    fetch('../data/player.json'),
                    fetch('../data/enemies.json')
                ]);

                const weaponsData = await weaponsRes.json();
                const playerData = await playerRes.json();
                const enemiesData = await enemiesRes.json();

                const playerBase = playerData.players.anthony;
                const enemyBase = enemiesData.enemies.basic_cell;

                // Préchargement des visuels
                function collectAssets(obj) {
                    const paths = [];
                    const find = (o) => {
                        if (!o || typeof o !== 'object') return;
                        if (o.frames && Array.isArray(o.frames)) {
                            o.frames.forEach(p => paths.push(p));
                        }
                        Object.values(o).forEach(find);
                    };
                    find(obj);
                    return paths;
                }

                const assetsToLoad = [
                    ...collectAssets(playerBase),
                    ...collectAssets(enemyBase),
                    ...collectAssets(weaponsData)
                ];

                // On s'assure que les chemins sont corrects (relatifs au dossier racine)
                // Dans le jeu ils sont 'assets/...', ici aussi ils devraient l'être
                // l'AssetManager chargera via fetch('../' + path) si besoin ? non
                // AssetManager charge via fetch(path).
                
                // On va modifier temporairement l'AssetManager pour chercher au bon endroit si besoin
                // Mais normalement si on lance depuis le serveur à la racine
                // tests/weapons_showcase.html -> assets/... c'est pas bon.
                // Il faut '../assets/...'
                
                // Patch de l'AssetManager pour chercher au bon endroit par rapport au dossier tests/
                assetManager.loadImage = (originalPath) => {
                    if (assetManager.images.has(originalPath)) {
                        return Promise.resolve(assetManager.images.get(originalPath));
                    }

                    const modifiedPath = originalPath.startsWith('assets/') ? '../' + originalPath : originalPath;
                    const promise = new Promise((resolve, reject) => {
                        const img = new Image();
                        img.src = modifiedPath;
                        img.onload = () => {
                            assetManager.images.set(originalPath, img); // On garde la clé originale pour Animator
                            resolve(img);
                        };
                        img.onerror = () => {
                            console.warn(`Impossible de charger l'image : ${modifiedPath}`);
                            resolve(null); // On ne bloque pas tout le chargement
                        };
                    });
                    assetManager.loadingPromises.push(promise);
                    return promise;
                };

                assetsToLoad.forEach(path => assetManager.loadImage(path));
                await assetManager.waitForAll();

                // Cacher le loader
                document.getElementById('loader').style.display = 'none';

                const scenarios = weaponsData.weapons.map(weapon => {
                    let enemies = [{ x: 300, y: 150, hp: 1000 }];
                    let desc = `Classe : ${weapon.type}. `;

                    if (weapon.logic === 'orbital' || weapon.id.includes('orbital')) {
                        enemies = [{ x: 150, y: 100, hp: 1000 }, { x: 150, y: 200, hp: 1000 }];
                        desc += "Protège Anthony en tournant.";
                    } else if (weapon.logic === 'area' || weapon.id.includes('poison') || weapon.id.includes('wave')) {
                        enemies = [{ x: 100, y: 100, hp: 1000 }, { x: 150, y: 200, hp: 1000 }];
                        desc += "Zone d'effet constante.";
                    } else {
                        desc += "Tire des projectiles.";
                    }

                    return {
                        id: weapon.id,
                        name: weapon.name,
                        desc: desc,
                        weaponData: weapon,
                        playerStats: playerBase,
                        enemyStats: enemyBase,
                        enemyPositions: enemies
                    };
                });

                class Showcase {
                    constructor(config, container) {
                        this.config = config;
                        this.canvas = document.createElement('canvas');
                        this.canvas.width = 400;
                        this.canvas.height = 300;
                        container.appendChild(this.canvas);
                        this.ctx = this.canvas.getContext('2d');

                        this.reset();
                        this.lastTime = performance.now();
                        this.requestId = requestAnimationFrame((t) => this.animate(t));
                    }

                    reset() {
                        this.player = new Player(80, 150, this.config.playerStats, assetManager);
                        this.player.weapons = [];
                        this.player.addWeapon(WeaponFactory.create(this.config.weaponData, assetManager));
                        
                        this.enemies = this.config.enemyPositions.map(pos => 
                            new Enemy(pos.x, pos.y, { ...this.config.enemyStats, speed: 0 }, assetManager)
                        );
                        
                        this.projectiles = [];
                        this.explosions = [];
                    }

                    animate(time) {
                        const dt = time - this.lastTime || 0;
                        this.lastTime = time;
                        this.update(dt);
                        this.draw();
                        this.requestId = requestAnimationFrame((t) => this.animate(t));
                    }

                    update(dt) {
                        const targetDir = { dx: 1, dy: 0 };
                        
                        this.player.update(dt, { dx: 0, dy: 0 }, {
                            targetDir: targetDir,
                            onShoot: (x, y, dx, dy, stats) => this.projectiles.push(new Projectile(x, y, dx, dy, stats, assetManager)),
                            enemies: this.enemies,
                            boss: null,
                            explosions: this.explosions,
                            handleAOE: (x, y, r, d) => CombatSystem.handleAOE({ 
                                x, y, radius: r, damage: d, 
                                enemies: this.enemies, 
                                explosions: this.explosions 
                            })
                        });

                        // Projectiles
                        for (let i = this.projectiles.length - 1; i >= 0; i--) {
                            const p = this.projectiles[i];
                            p.update(dt);

                            for (const e of this.enemies) {
                                if (CombatSystem.checkCollision(p, e)) {
                                    p.hit(e, { enemies: this.enemies, explosions: this.explosions });
                                    break;
                                }
                            }

                            if (p.x > 450 || p.x < -50 || p.y > 350 || p.y < -50 || p.toRemove) {
                                this.projectiles.splice(i, 1);
                            }
                        }

                        // Explosions
                        for (let i = this.explosions.length - 1; i >= 0; i--) {
                            this.explosions[i].timer -= dt;
                            if (this.explosions[i].timer <= 0) this.explosions.splice(i, 1);
                        }

                        this.enemies.forEach(e => {
                            e.update(dt, this.player);
                            // On force l'animation walk car idle est souvent vide dans le JSON
                            if (e.animator) {
                                const idleAnim = e.animator.getAnimation('idle');
                                if (!idleAnim || !idleAnim.frames || idleAnim.frames.length === 0) {
                                    e.animator.currentState = 'walk';
                                }
                            }
                        });
                    }

                    draw() {
                        const ctx = this.ctx;
                        ctx.fillStyle = '#0a0a1a';
                        ctx.fillRect(0, 0, 400, 300);

                        // COUCHE 1 : Auras
                        if (this.player.drawAuras) this.player.drawAuras(ctx);
                        this.enemies.forEach(e => { if(e.drawAuras) e.drawAuras(ctx); });

                        // COUCHE 2 : Projectiles
                        this.projectiles.forEach(p => p.draw(ctx));

                        // COUCHE 3 : Personnages
                        this.enemies.forEach(e => {
                            e.draw(ctx);
                            // Barre de vie simplifiée
                            ctx.fillStyle = '#444';
                            ctx.fillRect(e.x - 20, e.y - 35, 40, 5);
                            ctx.fillStyle = '#f00';
                            ctx.fillRect(e.x - 20, e.y - 35, 40 * (Math.max(0, e.hp) / 1000), 5);
                        });

                        this.player.draw(ctx);

                        // COUCHE 4 : Explosions
                        this.explosions.forEach(exp => {
                            const a = exp.timer / exp.maxTimer;
                            const grad = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, exp.radius);
                            grad.addColorStop(0, `rgba(255, 200, 50, ${a})`);
                            grad.addColorStop(0.5, `rgba(255, 50, 0, ${a * 0.5})`);
                            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                            ctx.beginPath();
                            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                            ctx.fillStyle = grad;
                            ctx.fill();
                        });
                    }
                }

                const grid = document.getElementById('test-grid');
                scenarios.forEach(sc => {
                    const card = document.createElement('div');
                    card.className = 'test-card';
                    card.innerHTML = `
                        <h2>${sc.name}</h2>
                        <div class="canvas-container" id="c-${sc.id}"></div>
                        <div class="controls">${sc.desc}</div>
                        <button class="btn-reset" id="r-${sc.id}">Réinitialiser</button>
                    `;
                    grid.appendChild(card);
                    const inst = new Showcase(sc, document.getElementById(`c-${sc.id}`));
                    document.getElementById(`r-${sc.id}`).onclick = () => inst.reset();
                });

            } catch (err) {
                console.error("Erreur d'initialisation du showcase:", err);
                document.getElementById('loader').innerHTML = `<p style="color:red">Erreur : ${err.message}</p>`;
            }
        }

        init();
    </script>
</body>

</html>
